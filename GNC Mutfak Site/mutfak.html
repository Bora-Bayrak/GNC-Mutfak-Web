<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutfak Ekranı - GNC Mutfak</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            margin: 0;
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }

        #mutfakSiparisKutusu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .siparis-karti {
            background: #ecf0f1;
            color: #2c3e50;
            border-top: 5px solid #e74c3c;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .siparis-baslik {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 1px solid #bdc3c7;
            padding-bottom: 10px;
        }

        .siparis-baslik .masa-bilgi {
            color: #c0392b;
            font-size: 1.4rem;
        }

        .siparis-detay {
            flex-grow: 1;
        }

        .siparis-detay ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .siparis-detay li {
            margin-bottom: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 5px;
        }

        .tamamla-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .tamamla-btn:hover {
            background-color: #2ecc71;
        }

        .bos-durum {
            text-align: center;
            font-size: 1.5rem;
            color: #95a5a6;
            grid-column: 1 / -1;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <h1>👨‍🍳 Aktif Mutfak Siparişleri</h1>
    <div id="mutfakSiparisKutusu">
    </div>

    <script>
        function siparisleriGetir() {
            var kutu = document.getElementById('mutfakSiparisKutusu');
            var siparisler = JSON.parse(localStorage.getItem('mutfakSiparisleri')) || [];

            if (siparisler.length === 0) {
                kutu.innerHTML = "<div class='bos-durum'>Şu an bekleyen sipariş yok. Buralar çok sakin... ☕</div>";
                return;
            }

            var html = "";
            siparisler.forEach(function (siparis) {
                html += `
                <div class="siparis-karti">
                    <div class="siparis-baslik">
                        <span class="masa-bilgi">Masa ${siparis.masa} <span style="font-size:0.9rem; color:#7f8c8d;">(${siparis.kisi} Kişi)</span></span>
                        <span>🕒 ${siparis.saat}</span>
                    </div>
                    <div style="margin-bottom: 10px; font-size: 0.9rem; color: #7f8c8d;">
                        👤 Müşteri: ${siparis.musteri}
                    </div>
                    <div class="siparis-detay">
                        <ul>
                            ${siparis.detaylar.map(detay => `<li>✔️ ${detay}</li>`).join('')}
                        </ul>
                    </div>
                    <button class="tamamla-btn" onclick="siparisiTamamla(${siparis.id})">Siparişi Hazırlandı İşaretle</button>
                </div>
                `;
            });
            kutu.innerHTML = html;
        }

        // Siparişi listeden silme (tamamlama) fonksiyonu
        function siparisiTamamla(id) {
            var siparisler = JSON.parse(localStorage.getItem('mutfakSiparisleri')) || [];
            var guncelSiparisler = siparisler.filter(s => s.id !== id);
            localStorage.setItem('mutfakSiparisleri', JSON.stringify(guncelSiparisler));
            siparisleriGetir(); // Ekranı hemen yenile
        }

        // Sayfa ilk açıldığında siparişleri yükle
        siparisleriGetir();

        // index.html sekmesinden yeni sipariş gelirse bu sayfayı otomatik yenile
        window.addEventListener('storage', function (e) {
            if (e.key === 'mutfakSiparisleri') {
                siparisleriGetir();
            }
        });
    </script>
</body>

</html>
